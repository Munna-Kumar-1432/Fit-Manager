<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>PowerFit Gym Management System</title>
  <meta name="description"
    content="Premium Gym Management System - Manage members, trainers, memberships and analytics">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-950">
  <div id="auth-container"
    style="display:none; height: 100vh; align-items: center; justify-content: center; flex-direction: column;">
    <h1 style="color: white; font-family: Bebas Neue, sans-serif; font-size: 3rem; margin-bottom: 20px;">PowerFit <span
        style="color:#FF3B3F">Login</span></h1>
    <div id="sign-in"></div>
  </div>
  <app-root id="app-root" style="display:none;"></app-root>

  <script async crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y3V0ZS1yYXR0bGVyLTc0LmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://cute-rattler-74.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"></script>

  <script>
    window.addEventListener('load', async function () {
      const waitForClerk = setInterval(async () => {
        if (window.Clerk) {
          clearInterval(waitForClerk);
          try {
            await window.Clerk.load();

            const appRoot = document.getElementById('app-root');
            const authContainer = document.getElementById('auth-container');

            const updateUI = async () => {
              if (!window.Clerk.user) {
                appRoot.style.display = 'none';
                authContainer.style.display = 'flex';
                window.Clerk.mountSignIn(document.getElementById('sign-in'));
              } else {
                const email = window.Clerk.user.primaryEmailAddress?.emailAddress;
                if (email !== 'codewithmunna513@gmail.com') {
                  alert("Unauthorized access. Admin only.");
                  await window.Clerk.signOut();
                  return;
                }
                appRoot.style.display = 'block';
                authContainer.style.display = 'none';
              }
            };

            updateUI();
            window.Clerk.addListener(({ user }) => updateUI());
          } catch (err) {
            console.error('Clerk load error:', err);
          }
        }
      }, 100);
    });
  </script>
</body>

</html>
